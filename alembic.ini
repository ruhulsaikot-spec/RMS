# ============================================================
# Reimbursement Management System - Alembic Configuration
# ============================================================

[alembic]
# Path to migration environment
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path prepend - allows imports from project root
prepend_sys_path = .

# Timezone for timestamp in migration file names
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .hierarchical traversal in migration scripts
recursive_version_locations = false

# Default date format for new revision file names
output_encoding = utf-8

# Database URL - overridden in env.py from application settings
# This is a fallback for direct alembic commands
sqlalchemy.url = postgresql+psycopg2://rms_admin:change_me_in_production@localhost:5432/rms_database

#[post_write_hooks]
# Format migration files with ruff after generation
#hooks = ruff
#ruff.type = console_scripts
#ruff.entrypoint = ruff
#ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
